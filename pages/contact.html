<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Vesto | تماس با ما</title>
    <script type="module" src="/assets/js/main.js"></script>
  </head>
  <body class="bg-white p-8 selection:bg-sage/20 selection:text-dark">

   <!-- هدر -->
    <nav>
      <div class="flex flex-row justify-between items-center">
        <button>
          <img src="/assets/icons/meno.svg" alt="منو" />
        </button>

        <a href="/" class="font-bold">وستـو</a>

        <a href="#">
          <img src="/assets/icons/user.svg" alt="حساب کاربری" />
        </a>
      </div>
    </nav>

    <main class="mt-8 flex flex-col gap-y-8">

      <!-- تیتر -->
      <div class="flex flex-col gap-y-2 reveal">
        <span class="text-sage text-[11px] font-bold tracking-[0.15em] uppercase">ارتباط با ما</span>
        <h1 class="text-dark font-fat text-[28px] leading-tight">ما اینجاییم برای شما</h1>
        <p class="text-slate/60 text-xs leading-relaxed mt-1">هر سوال، پیشنهاد یا انتقادی دارید، خوشحال می‌شیم بشنویم.</p>
      </div>

      <!-- خط -->
      <div class="w-full h-px bg-dark/[0.04] reveal"></div>

      <!-- کارت‌های اطلاعات تماس -->
      <div class="grid grid-cols-3 gap-3 reveal">
        <a href="tel:+989121234567" class="flex flex-col items-center gap-y-2 bg-gray-50/80 rounded-2xl py-4 px-2 transition-colors hover:bg-gray-100/80 duration-200">
          <div class="w-10 h-10 rounded-full bg-sage/10 flex items-center justify-center">
            <svg class="w-5 h-5 text-sage" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/>
            </svg>
          </div>
          <span class="text-[10px] text-dark/70 font-bold text-center leading-relaxed">تماس<br/>تلفنی</span>
        </a>

        <a href="mailto:info@vesto.ir" class="flex flex-col items-center gap-y-2 bg-gray-50/80 rounded-2xl py-4 px-2 transition-colors hover:bg-gray-100/80 duration-200">
          <div class="w-10 h-10 rounded-full bg-sage/10 flex items-center justify-center">
            <svg class="w-5 h-5 text-sage" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
            </svg>
          </div>
          <span class="text-[10px] text-dark/70 font-bold text-center leading-relaxed">ایمیل</span>
        </a>

        <a href="https://instagram.com/vesto" target="_blank" class="flex flex-col items-center gap-y-2 bg-gray-50/80 rounded-2xl py-4 px-2 transition-colors hover:bg-gray-100/80 duration-200">
          <div class="w-10 h-10 rounded-full bg-sage/10 flex items-center justify-center">
            <svg class="w-5 h-5 text-sage" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zm0 0c0 1.657 1.007 3 2.25 3S21 13.657 21 12a9 9 0 10-2.636 6.364M16.5 12V8.25"/>
            </svg>
          </div>
          <span class="text-[10px] text-dark/70 font-bold text-center leading-relaxed">اینستاگرام</span>
        </a>
      </div>

      <!-- خط -->
      <div class="w-full h-px bg-dark/[0.04] reveal"></div>

      <!-- فرم تماس -->
      <form class="flex flex-col gap-y-4 reveal" id="contactForm">
        <div class="flex flex-col gap-y-1.5">
          <label class="text-dark text-sm font-bold">نام و نام خانوادگی</label>
          <input type="text" placeholder="مثال: سارا محمدی" class="w-full bg-gray-50/80 border border-dark/[0.06] rounded-2xl px-4 py-3 text-xs text-dark placeholder:text-slate/40 focus:outline-none focus:border-sage/40 focus:bg-white transition-all duration-200" />
        </div>

        <div class="flex flex-col gap-y-1.5">
          <label class="text-dark text-sm font-bold">ایمیل</label>
          <input type="email" placeholder="example@gmail.com" dir="ltr" class="w-full bg-gray-50/80 border border-dark/[0.06] rounded-2xl px-4 py-3 text-xs text-dark placeholder:text-slate/40 focus:outline-none focus:border-sage/40 focus:bg-white transition-all duration-200" />
        </div>

        <div class="flex flex-col gap-y-1.5">
          <label class="text-dark text-sm font-bold">موضوع</label>
          <div class="relative">
            <select class="w-full appearance-none bg-gray-50/80 border border-dark/[0.06] rounded-2xl px-4 py-3 text-xs text-dark focus:outline-none focus:border-sage/40 focus:bg-white transition-all duration-200 cursor-pointer" id="subjectSelect">
              <option value="" disabled selected>انتخاب کنید...</option>
              <option value="question">سوال درباره محصول</option>
              <option value="order">پیگیری سفارش</option>
              <option value="return">مرجوعی و گارانتی</option>
              <option value="collab">همکاری در فروش</option>
              <option value="other">سایر</option>
            </select>
            <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate/40 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </div>
        </div>

        <div class="flex flex-col gap-y-1.5">
          <label class="text-dark text-sm font-bold">پیام شما</label>
          <textarea rows="5" placeholder="پیام خود را اینجا بنویسید..." class="w-full bg-gray-50/80 border border-dark/[0.06] rounded-2xl px-4 py-3 text-xs text-dark placeholder:text-slate/40 focus:outline-none focus:border-sage/40 focus:bg-white transition-all duration-200 resize-none leading-relaxed"></textarea>
        </div>

        <button type="submit" class="w-full h-12 rounded-2xl bg-dark text-white text-sm font-bold flex items-center justify-center gap-x-2.5 hover:bg-dark/90 active:scale-[0.98] transition-all duration-200 shadow-[0_4px_14px_-2px_rgba(28,43,58,0.3)]" id="submitBtn">
          <svg class="w-4 h-4 brightness-0 invert" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
          </svg>
          <span>ارسال پیام</span>
        </button>
      </form>

      <!-- خط -->
      <div class="w-full h-px bg-dark/[0.04] reveal"></div>

      <!-- آدرس -->
      <div class="flex flex-col gap-y-3 reveal">
        <div class="flex items-center gap-x-2">
          <div class="w-8 h-8 rounded-full bg-sage/10 flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-sage" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
            </svg>
          </div>
          <div class="flex flex-col gap-y-0.5">
            <span class="text-dark text-xs font-bold">آدرس دفتر مرکزی</span>
            <p class="text-slate/60 text-[11px] leading-relaxed">تهران، خیابان ولیعصر، پلاک ۱۲۳، طبقه دوم</p>
          </div>
        </div>

        <div class="flex items-center gap-x-2">
          <div class="w-8 h-8 rounded-full bg-sage/10 flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-sage" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <div class="flex flex-col gap-y-0.5">
            <span class="text-dark text-xs font-bold">ساعات کاری</span>
            <p class="text-slate/60 text-[11px] leading-relaxed">شنبه تا پنجشنبه — ۹ صبح تا ۶ عصر</p>
          </div>
        </div>

        <div class="flex items-center gap-x-2">
          <div class="w-8 h-8 rounded-full bg-sage/10 flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-sage" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/>
            </svg>
          </div>
          <div class="flex flex-col gap-y-0.5">
            <span class="text-dark text-xs font-bold">تلفن و ایمیل</span>
            <p class="text-slate/60 text-[11px] leading-relaxed" dir="ltr">021-12345678 &nbsp;|&nbsp; info@vesto.ir</p>
          </div>
        </div>
      </div>

    </main>

    <!-- ===== اسکریپت‌ها ===== -->
    <script type="module">
      // =============================================
      // اسکرول ریویل (IntersectionObserver)
      // =============================================
      const reveals = document.querySelectorAll('.reveal')
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.opacity = '1'
            entry.target.style.transform = 'translateY(0)'
            observer.unobserve(entry.target)
          }
        })
      }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' })

      reveals.forEach(el => {
        el.style.opacity = '0'
        el.style.transform = 'translateY(18px)'
        el.style.transition = 'opacity 0.5s ease-out, transform 0.5s ease-out'
        observer.observe(el)
      })

      // =============================================
      // فرم تماس
      // =============================================
      const PERSIAN_DIGITS = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹']
      const toFa = n => String(n).split('').map(d => PERSIAN_DIGITS[d]).join('')

      const form = document.getElementById('contactForm')
      const submitBtn = document.getElementById('submitBtn')

      form.addEventListener('submit', (e) => {
        e.preventDefault()
        submitBtn.disabled = true
        submitBtn.style.transform = 'scale(0.97)'
        submitBtn.innerHTML = `
          <svg class="w-4 h-4 animate-spin brightness-0 invert" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <span>در حال ارسال...</span>
        `

        setTimeout(() => {
          submitBtn.innerHTML = `
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
            <span>پیام شما ارسال شد</span>
          `
          submitBtn.classList.remove('bg-dark', 'shadow-[0_4px_14px_-2px_rgba(28,43,58,0.3)]')
          submitBtn.classList.add('bg-sage', 'shadow-[0_4px_14px_-2px_rgba(125,158,140,0.3)]')
          submitBtn.style.transform = 'scale(1)'

          setTimeout(() => {
            submitBtn.innerHTML = `
              <svg class="w-4 h-4 brightness-0 invert" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
              </svg>
              <span>ارسال پیام</span>
            `
            submitBtn.classList.remove('bg-sage', 'shadow-[0_4px_14px_-2px_rgba(125,158,140,0.3)]')
            submitBtn.classList.add('bg-dark', 'shadow-[0_4px_14px_-2px_rgba(28,43,58,0.3)]')
            submitBtn.disabled = false
            form.reset()
          }, 2200)
        }, 800)
      })
    </script>
  </body>
</html>
